customCommands:
  - key: "C"
    command: 'msg=$(git diff --staged | opencode --model github-copilot/claude-haiku-4.5 run "git diffからconventional commitを1行。日本語。形式: type: 説明。余計な出力禁止)") && echo "Committing with message: $msg" && git commit -m "$msg"'
    context: "files"
    description: "AI: コミットメッセージ自動生成"
    loadingText: "Generating commit message..."
    output: "popup" # 結果を画面に表示する
