customCommands:
  - key: "C"
    command: 'msg=$(git diff --staged | claude -p "以下のgit diffに対してconventional commitメッセージを1行だけ出力してください。日本語で。形式: type: 説明（例: feat: ○○を追加）。余計なテキスト・コードブロック・説明は一切不要") && echo "Committing with message: $msg" && git commit -m "$msg"'
    context: "files"
    description: "AI: コミットメッセージ自動生成"
    loadingText: "Generating commit message..."
    output: "popup" # 結果を画面に表示する
